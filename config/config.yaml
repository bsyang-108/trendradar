# AI配置
ai:
  model: "bailian/glm-5"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 0.7
  max_tokens: 2000
  num_retries: 2

# AI分析配置
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 50

# 平台配置
platforms:
  enabled: true
  sources:
    - id: toutiao
      name: 今日头条
      enabled: true
    - id: baidu
      name: 百度热搜
      enabled: true
    - id: weibo
      name: 微博
      enabled: true
    - id: zhihu
      name: 知乎
      enabled: true
    - id: cls
      name: 财联社
      enabled: true
    - id: wallstreetcn
      name: 华尔街见闻
      enabled: true
    - id: thepaper
      name: 澎湃新闻
      enabled: true
    - id: 36kr
      name: 36氪
      enabled: true

# RSS配置
rss:
  enabled: true
  feeds:
    - id: jiqizhixin
      name: 机器之心
      url: https://www.jiqizhixin.com/rss
      enabled: true
    - id: 36kr-ai
      name: 36氪 - AI
      url: https://rsshub.rssforever.com/36kr/motif/327686782977
      enabled: true
    - id: liangziwei 
      name: 量子位
      url: https://www.qbitai.com/feed
      enabled: true


#    - id: hacker-news
#      name: Hacker News
#      url: https://hnrss.org/frontpage
#      enabled: true

# 通知配置
notification:
  batch_size:
    feishu: 30000

# 报告配置
report:
  mode: "daily"
  time_range: "24h"

# 调度配置 - 使用 custom 模板
schedule:
  enabled: false
  preset: "custom"
