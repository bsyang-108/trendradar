      start: "00:01"
      end: "23:58"
  day_plans:
    default:
      periods: [all_day]
  week_map:
    1: default
    2: default
    3: default
    4: default
    5: default
    6: default
    7: default

default:
  collect: true
  push: true
  analyze: true
  report_mode: daily
